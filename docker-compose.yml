version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: gmail-sender-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: gmail_sender
    volumes:
      - mongo_data:/data/db
    ports:
      - '27017:27017'
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: gmail-sender-api
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - '${PORT:-3000}:3000'
    environment:
      NODE_ENV:                ${NODE_ENV:-production}
      PORT:                    3000
      MONGO_URI:               mongodb://mongo:27017/gmail_sender
      RATE_LIMIT_WINDOW_MS:    ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-200}
      API_SECRET_KEY:          ${API_SECRET_KEY:-}
      CRYPT_SECRET:            ${CRYPT_SECRET:-troque_por_segredo_de_32_chars__}
    volumes:
      - logs:/app/logs
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  mongo_data:
  logs:
