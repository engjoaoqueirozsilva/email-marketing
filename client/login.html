<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JK Mail Sender — Acesso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    [data-theme="light"] {
      --page:      #F7F6F2;
      --surface:   #FFFFFF;
      --surface2:  #F0EFE9;
      --border:    #E2E0D8;
      --border2:   #CBC9BF;
      --accent:    #1A56DB;
      --accent-h:  #1447B8;
      --accent-bg: #EEF3FD;
      --error:     #C0392B;
      --error-bg:  #FDECEA;
      --success:   #0F7B3E;
      --text:      #1A1916;
      --text-2:    #5A5852;
      --text-3:    #9A9890;
      --shadow:    rgba(0,0,0,.08);
    }
    [data-theme="dark"] {
      --page:      #0F1117;
      --surface:   #181C27;
      --surface2:  #1E2333;
      --border:    #2A2F3F;
      --border2:   #353C50;
      --accent:    #4F7EFF;
      --accent-h:  #6B93FF;
      --accent-bg: rgba(79,126,255,.12);
      --error:     #EF4444;
      --error-bg:  rgba(239,68,68,.1);
      --success:   #22C55E;
      --text:      #E8EAF0;
      --text-2:    #9298B0;
      --text-3:    #5A6078;
      --shadow:    rgba(0,0,0,.35);
    }

    html { background:var(--page); color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px; line-height:1.6; transition:background .25s,color .25s; }
    *,*::before,*::after { transition:background-color .2s,border-color .2s,color .2s,box-shadow .2s; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* ── Fundo decorativo ─────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 20%, rgba(26,86,219,.06) 0%, transparent 70%),
        radial-gradient(ellipse 50% 35% at 80% 80%, rgba(26,86,219,.04) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    [data-theme="dark"] body::before {
      background:
        radial-gradient(ellipse 60% 40% at 20% 20%, rgba(79,126,255,.08) 0%, transparent 70%),
        radial-gradient(ellipse 50% 35% at 80% 80%, rgba(79,126,255,.05) 0%, transparent 70%);
    }

    /* ── Card ─────────────────────────────────────────────── */
    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 4px 24px var(--shadow);
      overflow: hidden;
    }

    /* ── Card header ─────────────────────────────────────── */
    .card-header {
      padding: 32px 32px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .logo-wrap {
      width: 48px; height: 48px;
      background: var(--accent);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 12px rgba(79,126,255,.35);
    }
    .logo-wrap svg { width: 24px; height: 24px; fill: #fff; }
    .card-header h1 {
      font-size: 18px; font-weight: 600;
      color: var(--text); letter-spacing: -.3px;
      text-align: center;
    }
    .card-header p {
      font-size: 12px; font-family: 'JetBrains Mono', monospace;
      color: var(--text-3); text-align: center;
    }

    /* ── Card body ───────────────────────────────────────── */
    .card-body { padding: 28px 32px 32px; }

    .field { margin-bottom: 16px; }
    .field:last-of-type { margin-bottom: 0; }
    label {
      display: block;
      font-size: 11px; font-weight: 600;
      color: var(--text-2);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: .6px;
    }

    .input-wrap {
      position: relative;
    }
    .input-wrap svg {
      position: absolute;
      left: 11px; top: 50%;
      transform: translateY(-50%);
      width: 15px; height: 15px;
      opacity: .4;
      pointer-events: none;
    }
    input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      padding: 10px 11px 10px 34px;
      outline: none;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-bg);
    }
    input::placeholder { color: var(--text-3); }

    /* toggle senha visível */
    .eye-btn {
      position: absolute;
      right: 10px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer; padding: 2px;
      color: var(--text-3); display: flex;
      border-radius: 4px;
    }
    .eye-btn:hover { color: var(--text-2); }
    .eye-btn svg { width: 16px; height: 16px; }

    /* ── Erro ─────────────────────────────────────────────── */
    .error-msg {
      display: none;
      align-items: center;
      gap: 7px;
      padding: 10px 12px;
      background: var(--error-bg);
      border: 1px solid rgba(192,57,43,.25);
      border-radius: 7px;
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--error);
      margin-bottom: 16px;
      animation: shake .35s ease;
    }
    [data-theme="dark"] .error-msg { border-color: rgba(239,68,68,.25); }
    .error-msg.show { display: flex; }
    .error-msg svg { width: 14px; height: 14px; flex-shrink: 0; }

    @keyframes shake {
      0%,100%{ transform:translateX(0) }
      20%    { transform:translateX(-6px) }
      40%    { transform:translateX(6px) }
      60%    { transform:translateX(-4px) }
      80%    { transform:translateX(4px) }
    }

    /* ── Botão ────────────────────────────────────────────── */
    .btn-login {
      width: 100%;
      margin-top: 20px;
      padding: 11px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: .2px;
      box-shadow: 0 1px 6px rgba(79,126,255,.35);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-login:hover { background: var(--accent-h); }
    .btn-login:active { transform: scale(.98); }
    .btn-login:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ───────────────────────────────────────────── */
    .card-footer {
      padding: 14px 32px;
      border-top: 1px solid var(--border);
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-footer span {
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-3);
    }
    .btn-theme {
      width: 28px; height: 28px;
      border-radius: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; padding: 0;
    }
    .btn-theme:hover { background: var(--accent-bg); border-color: var(--accent); }
    [data-theme="light"] .icon-moon { display:block }
    [data-theme="light"] .icon-sun  { display:none  }
    [data-theme="dark"]  .icon-sun  { display:block }
    [data-theme="dark"]  .icon-moon { display:none  }

    /* ── Tentativas bloqueio ──────────────────────────────── */
    .attempts-bar {
      display: flex; gap: 5px;
      margin-top: 10px;
      justify-content: center;
    }
    .attempt-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--border2);
      transition: background .2s;
    }
    .attempt-dot.used { background: var(--error); }
  </style>
</head>
<body>

<div class="card">

  <div class="card-header">
    <div class="logo-wrap">
      <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
    </div>
    <h1>JK Mail Sender</h1>
    <p>Acesso restrito — insira suas credenciais</p>
  </div>

  <div class="card-body">

    <div class="error-msg" id="error-msg">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
      <span id="error-text">Usuário ou senha incorretos.</span>
    </div>

    <div class="field">
      <label>E-mail</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
        <input type="email" id="inp-user" placeholder="seu@email.com.br" autocomplete="username" />
      </div>
    </div>

    <div class="field">
      <label>Senha</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
        <input type="password" id="inp-pass" placeholder="••••••••••" autocomplete="current-password" />
        <button class="eye-btn" id="eye-btn" type="button" title="Mostrar senha">
          <svg id="eye-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
        </button>
      </div>
    </div>

    <div class="attempts-bar" id="attempts-bar">
      <div class="attempt-dot" id="d1"></div>
      <div class="attempt-dot" id="d2"></div>
      <div class="attempt-dot" id="d3"></div>
      <div class="attempt-dot" id="d4"></div>
      <div class="attempt-dot" id="d5"></div>
    </div>

    <button class="btn-login" id="btn-login" type="button">
      <span id="btn-text">Entrar</span>
    </button>

  </div>

  <div class="card-footer">
    <span>JK Mail Sender v2.0</span>
    <button class="btn-theme" id="btn-theme" title="Alternar tema">
      <span class="icon-moon">🌙</span>
      <span class="icon-sun">☀️</span>
    </button>
  </div>

</div>

<script>
  // ── Usuários autorizados ─────────────────────────────────────────────────
  // ⚠️  Adicione ou remova entradas para gerenciar o acesso
  const USERS = [
    { email: 'jk@ia-outsider.com.br', password: 'Manu2710@@' },
    { email: 'henrique@ia-outsider.com.br', password: 'Levi1010@@' }
  ];

  // Chave que será injetada nas páginas protegidas (mesma do .env API_SECRET_KEY)
  const API_KEY    = 'sua_chave_aqui';

  // ── Constantes de controle ────────────────────────────────────────────────
  const MAX_ATTEMPTS  = 5;
  const LOCK_DURATION = 30 * 1000; // 30 segundos de bloqueio após 5 tentativas
  const SESSION_KEY   = 'gs_session';
  const LOCK_KEY      = 'gs_lock';

  // ── Theme ─────────────────────────────────────────────────────────────────
  (function(){
    const saved = localStorage.getItem('gs_theme')
      || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.dataset.theme = saved;
  })();
  document.getElementById('btn-theme').addEventListener('click', () => {
    const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
    document.documentElement.dataset.theme = next;
    localStorage.setItem('gs_theme', next);
  });

  // ── Verificar sessão ativa ────────────────────────────────────────────────
  // Se já autenticado, redireciona direto para o cliente
  if (sessionStorage.getItem(SESSION_KEY) === 'ok') {
    window.location.replace('index.html');
  }

  // ── Refs ──────────────────────────────────────────────────────────────────
  const inpUser  = document.getElementById('inp-user');
  const inpPass  = document.getElementById('inp-pass');
  const btnLogin = document.getElementById('btn-login');
  const btnText  = document.getElementById('btn-text');
  const errMsg   = document.getElementById('error-msg');
  const errText  = document.getElementById('error-text');
  const eyeBtn   = document.getElementById('eye-btn');
  const eyeIcon  = document.getElementById('eye-icon');
  const dots     = [1,2,3,4,5].map(i => document.getElementById('d'+i));

  let attempts = Number(sessionStorage.getItem('gs_attempts') || 0);
  updateDots();

  // ── Toggle senha ──────────────────────────────────────────────────────────
  eyeBtn.addEventListener('click', () => {
    const show = inpPass.type === 'password';
    inpPass.type = show ? 'text' : 'password';
    eyeIcon.innerHTML = show
      ? '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-5 0-9.27-3.11-11-7.5a18.42 18.42 0 015.06-7.06M9.9 4.24A9.12 9.12 0 0112 4c5 0 9.27 3.11 11 7.5a18.5 18.5 0 01-2.16 3.19M1 1l22 22"/>'
      : '<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>';
  });

  // ── Verificar bloqueio ────────────────────────────────────────────────────
  function isLocked() {
    const until = Number(sessionStorage.getItem(LOCK_KEY) || 0);
    return Date.now() < until;
  }

  function getRemainingLock() {
    const until = Number(sessionStorage.getItem(LOCK_KEY) || 0);
    return Math.ceil((until - Date.now()) / 1000);
  }

  function updateDots() {
    dots.forEach((d, i) => d.classList.toggle('used', i < attempts));
  }

  function showError(msg) {
    errText.textContent = msg;
    errMsg.classList.remove('show');
    void errMsg.offsetWidth; // reflow para reativar animação shake
    errMsg.classList.add('show');
  }

  function hideError() {
    errMsg.classList.remove('show');
  }

  // ── Login ─────────────────────────────────────────────────────────────────
  async function doLogin() {
    hideError();

    if (isLocked()) {
      showError(`Muitas tentativas. Aguarde ${getRemainingLock()}s.`);
      return;
    }

    const user = inpUser.value.trim().toLowerCase();
    const pass = inpPass.value;

    if (!user || !pass) {
      showError('Preencha e-mail e senha.');
      return;
    }

    // Simular delay de autenticação (UX + dificulta brute force)
    btnLogin.disabled = true;
    btnText.innerHTML = '<div class="spinner"></div>';
    await new Promise(r => setTimeout(r, 600));

    const ok = USERS.some(u => u.email.toLowerCase() === user && u.password === pass);

    if (ok) {
      // Sessão autenticada — armazena a API Key para as outras páginas
      sessionStorage.setItem(SESSION_KEY, 'ok');
      sessionStorage.setItem('gs_api_key_runtime', API_KEY);
      sessionStorage.removeItem('gs_attempts');
      sessionStorage.removeItem(LOCK_KEY);

      // Feedback visual de sucesso antes de redirecionar
      btnText.textContent = '✓ Autenticado';
      btnLogin.style.background = '#0F7B3E';
      await new Promise(r => setTimeout(r, 500));
      window.location.replace('index.html');
    } else {
      attempts++;
      sessionStorage.setItem('gs_attempts', attempts);
      updateDots();

      if (attempts >= MAX_ATTEMPTS) {
        sessionStorage.setItem(LOCK_KEY, Date.now() + LOCK_DURATION);
        attempts = 0;
        sessionStorage.setItem('gs_attempts', 0);
        updateDots();
        showError(`${MAX_ATTEMPTS} tentativas incorretas. Aguarde 30s.`);
        // Countdown no botão
        let remaining = LOCK_DURATION / 1000;
        const interval = setInterval(() => {
          remaining--;
          btnText.textContent = `Aguarde ${remaining}s`;
          if (remaining <= 0) {
            clearInterval(interval);
            btnLogin.disabled = false;
            btnText.textContent = 'Entrar';
            hideError();
          }
        }, 1000);
      } else {
        showError(`Usuário ou senha incorretos. (${MAX_ATTEMPTS - attempts} tentativa${MAX_ATTEMPTS - attempts !== 1 ? 's' : ''} restante${MAX_ATTEMPTS - attempts !== 1 ? 's' : ''})`);
        btnLogin.disabled = false;
        btnText.textContent = 'Entrar';
        inpPass.value = '';
        inpPass.focus();
      }
    }
  }

  btnLogin.addEventListener('click', doLogin);
  inpPass.addEventListener('keydown',  e => { if (e.key === 'Enter') doLogin(); });
  inpUser.addEventListener('keydown',  e => { if (e.key === 'Enter') inpPass.focus(); });

  // ── Focar no primeiro campo ───────────────────────────────────────────────
  inpUser.focus();
</script>
</body>
</html>
